apiVersion: v1
kind: Pod
metadata:
  name: memhog
spec:
  containers:
    - name: memhog
      image: python:3.12-slim
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "200m"
      command: ["python", "-c"]
      args:
        - |
          import time
          a = []
          while True:
              a.append("x" * 1024 * 1024)
              print(f"allocated {len(a)} MiB", flush=True)
              time.sleep(0.05)
