apiVersion: v1
kind: Pod
metadata:
  name: incident-demo
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Starting application..."
          echo "APP CONFIG:"
          cat /app/config.txt
          echo
          sleep 3600
      volumeMounts:
        - name: config
          mountPath: /app
  volumes:
    - name: config
      configMap:
        name: app-config
