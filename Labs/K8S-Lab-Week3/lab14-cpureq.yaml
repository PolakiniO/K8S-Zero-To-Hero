apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpureq
  namespace: lab14
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpureq
  template:
    metadata:
      labels:
        app: cpureq
    spec:
      nodeSelector:
        kubernetes.io/hostname: labnp-worker
      containers:
        - name: hog
          image: polinux/stress
          command: ["stress"]
          args: ["--cpu", "1", "--timeout", "600"]
          resources:
            requests:
              cpu: "1500m"
              memory: "64Mi"
            limits:
              cpu: "1500m"
              memory: "128Mi"
